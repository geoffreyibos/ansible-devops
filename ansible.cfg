[defaults]
interpreter_python = auto
roles_path = ./.ansible/roles
collections_path = ./.ansible/collections
vault_password_file = ./.devops_vault_pass.txt
nocows = 1
timeout = 30
remote_tmp = /tmp
allow_world_readable_tmpfiles = True
stdout_callback = ansible.builtin.default
result_format = yaml
bin_ansible_callbacks = True

[ssh_connection]
ssh_args = -o ForwardAgent=yes -o ServerAliveInterval=10 -o ControlMaster=auto -o ControlPersist=600s

[privilege_escalation]
become_flags = -H -S -E -n
