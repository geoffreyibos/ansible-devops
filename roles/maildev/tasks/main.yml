---
- name: Install Node.js and npm
  ansible.builtin.apt:
    name:
      - nodejs
      - npm
    state: present
  become: true

- name: Install Maildev globally
  community.general.npm:
    name: maildev
    global: true
    state: present
  become: true

- name: Install Maildev systemd service
  ansible.builtin.template:
    src: maildev.service.j2
    dest: /etc/systemd/system/maildev.service
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: Restart maildev

- name: Ensure Maildev is enabled and started
  ansible.builtin.systemd:
    name: maildev
    state: started
    enabled: true
    daemon_reload: true
  become: true
