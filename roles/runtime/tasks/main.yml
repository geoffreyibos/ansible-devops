---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  become: true

- name: Install Python runtime packages
  ansible.builtin.apt:
    name:
      - python3
      - python3-venv
      - python3-pip
      - python3-psycopg2
      - acl
      - curl
    state: present
  become: true
